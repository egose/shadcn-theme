name: Publish Angular in GitHub Pages

on:
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Setup NPM Packages
      uses: ./.github/actions/setup-npm

    - name: Angular Build 📦
      run: |
        pnpm build
        touch dist/angular/browser/.nojekyll
      working-directory: packages/angular/@examples/standard

    - name: Angular Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
      with:
        folder: packages/angular/@examples/standard/dist/angular/browser
        branch: pages-angular
        clean: true
        force: true
